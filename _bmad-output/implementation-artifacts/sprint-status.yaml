  td-9-5c-01-exclude-client-user-from-team-count: tech-debt  # NEW 2026-07-17 (story 9-5c PD3c). countActiveTeamMembers (packages/db/src/queries/workspaces/members.ts:89) counts ALL active workspace_members rows including client_user, but PRD L812 says client_user is "not a workspace member" and a "fundamentally different permission axis". Semantically client_user rows should not consume a team headcount seat. Deferred from 9-5c because changing the count risks breaking 9-4 tier-enforcement tests + requires re-auditing enforceTierLimit; the role-priority sort in 9-5c suspends client_user last so they're protected by the algorithm regardless. Fix: add .neq('role','client_user') to countActiveTeamMembers + update 9-4 tests. Low risk, ~0.5d.
  td-9-5c-02-email-from-address-override: tech-debt  # NEW 2026-07-17 (story 9-5c Task 6). ResendTransactionalProvider (packages/agents/providers/resend/resend-transactional-provider.ts:34) hardcodes the from-address as 'Flow OS <invoices@flow.app>' and does not accept a per-send override. Member/owner suspension emails (9-5c AC5) therefore come from invoices@flow.app, which is mildly awkward (the invoices@ local part is invoice-specific). Accepted for 9-5c to avoid scope creep (refactoring the provider touches 2 existing call sites: invoice-send, portal-client-notification). Fix: add a `from` argument to TransactionalEmailProvider.send + the payload, thread it through the 2 call sites + the 9-5c suspension dispatch. Low risk, ~0.5d.
  td-9-5c-03-webhook-router-dispatch-table: tech-debt  # NEW 2026-07-17 (story 9-5c code review I2). apps/web/lib/stripe/handlers/subscription-updated.ts is at 302 lines (over the 250-line hard limit) and grew again when 9-5c added the Agency→Pro + Pro→Agency tier-transition branches. There are now three sibling branches (Free / Pro / Agency) following the same shape: dispatch on (previousTier, effectiveTier), wrap in try/catch, writeAuditLog on failure with reconcileFallback. Pattern is ripe for a dispatch table: `const TIER_TRANSITION_HANDLERS: Record<string, (ctx) => Promise<void>>` keyed by `${previousTier}->${effectiveTier}`. Not blocking — the branches work and are individually clear — but the next story that touches this file will hit the same wall. Fix: extract the three branches into a handler map + per-handler functions in a `tier-transitions/` directory; the router shrinks to a lookup + invoke. Low risk, ~1d.
  td-9-5c-04-suspended-count-service-role-read-path: tech-debt  # NEW 2026-07-17 (story 9-5c code review M2). The suspended-member count (`countSuspendedMembers`) runs via `createServiceClient()` on every billing page + team page render, and the layout's SuspendedMemberBanner lookup is per-navigation. Two service_role reads per page load. Acceptable today (infrequent surfaces, indexed query, small row counts), but if suspended counts grow this becomes a hot service_role read path. The `revalidateTag('workspace_member', ...)` call in the webhook helps but the layout doesn't consume it. Fix options: (a) cache the count via Next.js `unstable_cache` keyed on the `workspace_member` tag so webhook revalidation invalidates it; (b) read via RLS-scoped client by widening owner SELECT to see suspended rows (requires a separate `owner_select_all` policy — security review needed); (c) accept as-is and revisit if telemetry shows latency. Defer until prod data justifies it. ~1d when triggered.
