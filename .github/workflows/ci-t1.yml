name: CI T1 (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-t1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-t1:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Enable corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build

      - run: pnpm test

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: |
          supabase start
          # Health check retry — wait for Postgres to be ready
          for i in $(seq 1 30); do
            if supabase db ping 2>/dev/null; then
              echo "Supabase is ready"
              break
            fi
            echo "Waiting for Supabase... ($i/30)"
            sleep 2
          done

      - name: Run pgTAP RLS tests (P0 gate)
        run: supabase test db

      - name: Drizzle schema parity check
        run: pnpm --filter @flow/db db:check
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
